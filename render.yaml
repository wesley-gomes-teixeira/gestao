services:
  - type: web
    name: gestao-suporte
    runtime: node
    plan: free
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: DEFAULT_ADMIN_EMAIL
        value: wesley@gmail.com
      - key: DEFAULT_ADMIN_PASSWORD
        value: Wesley@1.
      - key: DEFAULT_ADMIN_NAME
        value: Wesley
      - key: DATABASE_URL
        fromDatabase:
          name: gestao-suporte-db
          property: connectionString

databases:
  - name: gestao-suporte-db
    plan: free
    databaseName: gestao_db
    user: gestao_user
